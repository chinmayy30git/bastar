<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bastar Curtain – p5.js</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            background: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        canvas {
            display: block;
            max-width: 100vw;
            max-height: 100vh;
            max-height: 100dvh;
            touch-action: none;
            /* prevents browser gestures */
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
</head>

<body>
    <script>
        // ─────────────────────────────────────
        // p5.js sketch – Bastar curtain
        // ─────────────────────────────────────
        new p5((p) => {
            // CONFIG
            const DESIGN_W = 1000;
            const DESIGN_H = 1000;
            const GRAVITY = 650;
            const DAMPING = 0.99;
            const CONSTRAINT_ITERS = 3;
            const POINTER_RADIUS = 90;
            const POINTER_FORCE = 4000;
            const STRING_COUNT = 8;
            const LETTERS_PER_STRING = 16;
            const LETTER_SPACING = 19;

            const LETTERS = ['B', 'A', 'S', 'T', 'A', 'R', '◆', 'B', 'A', 'S', 'T', 'A', 'R', '◆', 'B', 'A', 'S', 'T', 'A', 'R'];
            function getLetter(i) { return LETTERS[i % LETTERS.length]; }

            let img;
            let imgAspect = 1;
            let allPoints = [];
            let allConstraints = [];
            let anchors = [];

            // Verlet classes
            class Point {
                constructor(x, y, anchored = false) {
                    this.x = x; this.y = y;
                    this.px = x; this.py = y;
                    this.anchored = anchored;
                    this.mass = 1;
                    this.letter = '';
                }
                update(dt, g) {
                    if (this.anchored) return;
                    const vx = (this.x - this.px) * DAMPING;
                    const vy = (this.y - this.py) * DAMPING;
                    this.px = this.x; this.py = this.y;
                    this.x += vx;
                    this.y += vy + g * dt * dt;
                }
                applyForce(fx, fy) {
                    if (this.anchored) return;
                    this.x += fx / this.mass;
                    this.y += fy / this.mass;
                }
            }

            class Constraint {
                constructor(a, b, rest) {
                    this.a = a; this.b = b; this.rest = rest;
                }
                solve() {
                    const dx = this.b.x - this.a.x;
                    const dy = this.b.y - this.a.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 1e-5) return;
                    const correction = (this.rest - dist) / dist * 0.5;
                    const cx = dx * correction;
                    const cy = dy * correction;
                    if (!this.a.anchored) { this.a.x -= cx; this.a.y -= cy; }
                    if (!this.b.anchored) { this.b.x += cx; this.b.y += cy; }
                }
            }

            // ─────────────────────────────────────
            // Curtain build / reset
            // ─────────────────────────────────────
            function buildCurtain(anchorPointsArray) {
                allPoints = [];
                allConstraints = [];
                anchors = anchorPointsArray.map(a => ({ x: a.x, y: a.y }));

                for (let s = 0; s < anchors.length; s++) {
                    const ax = anchors[s].x;
                    const ay = anchors[s].y;
                    const anchor = new Point(ax, ay, true);
                    anchor.letter = '◆';
                    allPoints.push(anchor);
                    let prev = anchor;
                    for (let l = 0; l < LETTERS_PER_STRING; l++) {
                        const px = ax * 1.2;  // slight outward spread
                        const py = ay + (l + 1) * LETTER_SPACING;
                        const point = new Point(px, py, false);
                        point.letter = getLetter(l);
                        point.mass = 0.9 + Math.random() * 0.2;
                        allPoints.push(point);
                        allConstraints.push(new Constraint(prev, point, LETTER_SPACING));
                        prev = point;
                    }
                }
            }

            function resetCurtain(anchorPointsArray) {
                anchors = anchorPointsArray.map(a => ({ x: a.x, y: a.y }));
                let idx = 0;
                for (let s = 0; s < anchors.length; s++) {
                    const ax = anchors[s].x;
                    const ay = anchors[s].y;
                    const anchor = allPoints[idx];
                    anchor.x = ax; anchor.y = ay;
                    anchor.px = ax; anchor.py = ay;
                    idx++;
                    for (let l = 0; l < LETTERS_PER_STRING; l++) {
                        const p = allPoints[idx];
                        p.x = ax + (Math.random() - 0.5) * 0.3;
                        p.y = ay + (l + 1) * LETTER_SPACING;
                        p.px = p.x; p.py = p.y;
                        p.letter = getLetter(l);
                        idx++;
                    }
                }
            }

            // ─────────────────────────────────────
            // Anchor points (now relative to image)
            // ─────────────────────────────────────
            function getAnchorPoints() {
                if (!img || !img.width) return [{ x: DESIGN_W / 2, y: 200 }]; // fallback
                const imgW = DESIGN_W;
                const imgH = imgW / imgAspect;
                const imgY = (DESIGN_H - imgH) / 2;
                const crownBaseY = imgY + 20;               // just below image top
                const halfWidth = imgW * 0.35;
                const centerX = DESIGN_W / 2;
                const crownHeight = 30;
                const count = STRING_COUNT;
                const pts = [];
                for (let i = 0; i < count; i++) {
                    const t = i / (count - 1);
                    const x = centerX + (t - 0.5) * 2 * halfWidth;
                    const curve = 1 - 4 * Math.pow(t - 0.5, 2);
                    const y = crownBaseY - crownHeight * curve;
                    pts.push({ x, y });
                }
                return pts;
            }

            // ─────────────────────────────────────
            // Pointer handling (p5 mouse / touch)
            // ─────────────────────────────────────
            let pointerDown = false;
            let pointerX = -999, pointerY = -999;
            let pointerPX = -999, pointerPY = -999;
            let pointerVX = 0, pointerVY = 0;
            let pointerActive = false;

            function getCanvasPos() {
                // p5's mouseX/Y are in canvas coordinates (after scale)
                return { x: p.mouseX, y: p.mouseY };
            }

            p.mousePressed = function () {
                pointerDown = true;
                pointerActive = true;
                const pos = getCanvasPos();
                pointerX = pos.x; pointerY = pos.y;
                pointerPX = pointerX; pointerPY = pointerY;
                pointerVX = 0; pointerVY = 0;
            };

            p.mouseReleased = function () {
                pointerDown = false;
                pointerActive = false;
                pointerVX = 0; pointerVY = 0;
                setTimeout(() => { if (!pointerDown) pointerActive = false; }, 300);
            };

            p.touchStarted = function () {
                p.mousePressed();
                return false; // prevent default
            };

            p.touchMoved = function () {
                p.mouseDragged();
                return false;
            };

            p.touchEnded = function () {
                p.mouseReleased();
                return false;
            };

            p.mouseDragged = function () {
                const pos = getCanvasPos();
                pointerPX = pointerX; pointerPY = pointerY;
                pointerX = pos.x; pointerY = pos.y;
                pointerVX = pointerX - pointerPX;
                pointerVY = pointerY - pointerPY;
                pointerActive = true;
            };

            p.mouseMoved = function () {
                const pos = getCanvasPos();
                pointerX = pos.x; pointerY = pos.y;
                pointerPX = pointerX; pointerPY = pointerY;
                pointerActive = true;
            };

            function applyPointerForces() {
                if (!pointerActive && !pointerDown) return;
                const r2 = POINTER_RADIUS * POINTER_RADIUS;
                for (const pt of allPoints) {
                    if (pt.anchored) continue;
                    const dx = pt.x - pointerX;
                    const dy = pt.y - pointerY;
                    const d2 = dx * dx + dy * dy;
                    if (d2 < r2 && d2 > 0.01) {
                        const dist = Math.sqrt(d2);
                        const influence = 1 - dist / POINTER_RADIUS;
                        const strength = influence * influence;
                        if (pointerDown && (Math.abs(pointerVX) > 0.5 || Math.abs(pointerVY) > 0.5)) {
                            pt.applyForce(pointerVX * strength * POINTER_FORCE * 0.015,
                                pointerVY * strength * POINTER_FORCE * 0.015);
                        } else if (pointerDown) {
                            const push = strength * 20;
                            pt.applyForce((dx / dist) * push, (dy / dist) * push);
                        }
                        if (!pointerDown && dist < POINTER_RADIUS * 0.6) {
                            const gentle = (1 - dist / (POINTER_RADIUS * 0.6)) * 3;
                            pt.applyForce((dx / dist) * gentle, (dy / dist) * gentle);
                        }
                    }
                }
            }

            // ─────────────────────────────────────
            // p5 lifecycle
            // ─────────────────────────────────────
            p.preload = function () {
                img = p.loadImage('bastar2.png', () => {
                    imgAspect = img.width / img.height;
                });
            };

            p.setup = function () {
                p.createCanvas(p.windowWidth, p.windowHeight);
                p.pixelDensity(Math.min(p.displayDensity(), 2));
                resizeCanvasToDesign();

                // Move the touch listeners here
                p.canvas.addEventListener('touchstart', (e) => e.preventDefault(), { passive: false });
                p.canvas.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });

                const anchorsArr = getAnchorPoints();
                buildCurtain(anchorsArr);
            };

            function resizeCanvasToDesign() {
                const vw = p.windowWidth;
                const vh = p.windowHeight;
                const aspect = DESIGN_W / DESIGN_H;
                let w, h;
                if (vw / vh > aspect) {
                    h = vh;
                    w = vh * aspect;
                } else {
                    w = vw;
                    h = vw / aspect;
                }
                p.resizeCanvas(w, h);
                // Scale the drawing so that design coordinates map to canvas pixels
                p.scale(w / DESIGN_W, h / DESIGN_H);
            }

            p.windowResized = function () {
                resizeCanvasToDesign();
                // Re‑anchor curtain to fit new image position
                const anchorsArr = getAnchorPoints();
                if (allPoints.length > 0) resetCurtain(anchorsArr);
                else buildCurtain(anchorsArr);
            };

            p.draw = function () {
                p.background(255);

                // Physics update
                const dt = p.deltaTime / 1000;
                const clampedDt = Math.min(dt, 0.033);
                for (const pt of allPoints) pt.update(clampedDt, GRAVITY);
                applyPointerForces();
                for (let i = 0; i < CONSTRAINT_ITERS; i++) {
                    for (const c of allConstraints) c.solve();
                }
                // Keep inside bounds
                for (const pt of allPoints) {
                    if (pt.anchored) continue;
                    const minY = (anchors[0]?.y || 300) + LETTER_SPACING * 0.5;
                    if (pt.y < minY) pt.y = minY;
                    if (pt.y > DESIGN_H - 40) pt.y = DESIGN_H - 40;
                    if (pt.x < 20) pt.x = 20;
                    if (pt.x > DESIGN_W - 20) pt.x = DESIGN_W - 20;
                }

                // Draw image full width
                if (img && img.width) {
                    const imgW = DESIGN_W;
                    const imgH = imgW / imgAspect;
                    const imgY = (DESIGN_H - imgH) / 2;
                    p.image(img, 0, imgY, imgW, imgH);
                }

                // Draw festival text
                const imgH = DESIGN_W / imgAspect;
                const imgBottom = (DESIGN_H - imgH) / 2 + imgH;
                const textY = imgBottom + 30;
                p.fill('#F07857');
                p.textFont('Georgia');
                p.textSize(42);
                p.textAlign(p.CENTER, p.TOP);
                p.text('Happy Goncha Festival', DESIGN_W / 2, textY);

                // Draw curtain letters
                p.textSize(13);
                for (const pt of allPoints) {
                    if (pt.anchored) continue;
                    if (!pt.letter || pt.letter === ' ') continue;
                    // Solid letter (optimized)
                    p.fill('#3a2210');
                    p.textAlign(p.CENTER, p.CENTER);
                    p.text(pt.letter, pt.x, pt.y);
                    // Highlight
                    p.fill('#ffffff');
                    p.text(pt.letter, pt.x - 0.4, pt.y - 0.4);
                }
            };

            // Prevent default touch scrolling/zooming on the canvas
            p.canvas.addEventListener('touchstart', (e) => e.preventDefault(), { passive: false });
            p.canvas.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });

        });
    </script>
</body>

</html>
